local_costmap:
  # 坐标系配置
  # global_frame 设为 odom (Fast-LIO叫 camera_init) 保证局部规划平滑
  global_frame: camera_init 
  robot_base_frame: body
  
  update_frequency: 3.0   # 局部避障更新要快
  publish_frequency: 3.0
  static_map: false       # 局部地图不加载静态大地图
  rolling_window: true    # 它是跟随飞机移动的窗口
  width: 3.0              # 窗口大小 4x4米
  height: 3.0
  resolution: 0.05

  plugins:
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}